<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Blouse Designs</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="bg.css">
</head>
  <body>
  <header>
    <div class="header-left">
      <img src="images/logo.jpeg" alt="Logo" class="site-logo">
      <h1>Blouse Designs</h1>
    </div>
    <nav>
      <a href="admin.html" id="admin-link" class="admin-link" style="display:none" target="_blank" rel="noopener noreferrer">Add Design</a>
      <button id="admin-btn" class="admin-login">Admin</button>
    </nav>
  </header>
  <main>
    <div class="controls">
      <label for="sort-select">Sort:</label>
      <select id="sort-select" aria-label="Sort designs">
        <option value="default">Newest</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
      </select>
    </div>
    <div id="designs" class="grid"></div>
    <div id="list-end-sentinel" aria-hidden="true" style="height:1px;"></div>
  </main>
  <!-- Admin login modal -->
  <div id="admin-modal" class="modal" aria-hidden="true">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="admin-modal-title">
      <h2 id="admin-modal-title">Admin Login</h2>
      <form id="admin-login-form">
        <label for="admin-password">Password</label>
        <input id="admin-password" name="password" type="password" autocomplete="current-password" required />
        <div class="modal-actions">
          <button type="submit">Login</button>
          <button type="button" id="admin-modal-close">Cancel</button>
        </div>
        <div id="admin-login-msg" class="login-msg" aria-live="polite"></div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
